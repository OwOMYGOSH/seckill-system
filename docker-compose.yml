version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: seckill_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: seckill
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: seckill-redis
    ports:
      - "6379:6379"
  prometheus:
    image: prom/prometheus:latest
    container_name: seckill_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: seckill_grafana
    ports:
      - "3000:3000" 
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin  
    depends_on:
      - prometheus

volumes:
  postgres_data: