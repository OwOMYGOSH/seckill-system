version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: seckill_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: seckill
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: seckill-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: